services:
  # Backend Web Service
  - type: web
    name: lead-gen-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lead-gen-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://lead-gen-frontend.onrender.com # Update this after frontend is deployed
      - key: ANTHROPIC_API_KEY
        sync: false # Set this in the Render dashboard

  # Frontend Static Site
  - type: static
    name: lead-gen-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: lead-gen-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: lead-gen-db
    plan: free # Use the free tier for now
